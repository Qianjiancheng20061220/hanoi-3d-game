<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Tower of Hanoi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>TOWER OF HANOI (3D)</h1>

        <div class="control-panel">
            <div class="disk-setting">
                <label>Number of disks:</label>
                <input type="number" id="diskCount" min="3" max="8" value="5">
                <span>Moves: <span id="moveCount">0</span></span>
            </div>
            <div class="btns">
                <button id="resetBtn">Reset</button>
                <button id="autoSolveBtn">Auto Solve</button>
            </div>
        </div>

        <div class="game-board">
            <div class="peg" data-peg="0"></div>
            <div class="peg" data-peg="1"></div>
            <div class="peg" data-peg="2"></div>
        </div>

        <div class="warning" id="warning">Warning: Cannot place larger disk!</div>
        <div class="victory" id="victory">🎉 You Win! 🎉</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
